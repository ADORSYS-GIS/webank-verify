# ──────────────────────────────────────────────────────────────────────────────
# webank-verify — CI + Build & Push to GHCR
#
# Cost-optimised design (based on fineract-apps patterns):
#   1. Concurrency groups — cancel redundant runs on same branch/PR.
#   2. Path-based triggers — skip CI when only docs/dashboard change.
#   3. Test job gates the expensive Docker build — skip build on test failure.
#   4. PRs validate the build (docker build, no push) — zero storage cost.
#   5. Docker layer cache via type=gha (free, fast) — ML model layers (~400 MB)
#      are cached and only rebuilt when requirements.txt changes.
#   6. Smart tagging: latest only on master/main, branch tags, short SHA.
#   7. Summary job — always reports status for branch protection checks.
#   8. Scoped permissions — minimum needed per job.
# ──────────────────────────────────────────────────────────────────────────────

name: CI & Deploy

on:
  push:
    branches: [master, develop, main]
    paths:
      - "app/**"
      - "migrations/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-test.txt"
      - "Dockerfile"
      - "Dockerfile.dev"
      - "docker-compose.yml"
      - ".dockerignore"
      - "alembic.ini"
      - "pytest.ini"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [master, develop, main]
    paths:
      - "app/**"
      - "migrations/**"
      - "tests/**"
      - "requirements.txt"
      - "requirements-test.txt"
      - "Dockerfile"
      - "Dockerfile.dev"
      - "docker-compose.yml"
      - ".dockerignore"
      - "alembic.ini"
      - "pytest.ini"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch: # Allow manual triggers

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ── Fast test gate ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest -q

  # ── Docker build + push ────────────────────────────────────────────────────
  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      # GHCR requires lowercase image names
      - name: Compute image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   Every push  → <short-sha> (e.g. abc1234)
      #   Every push  → <branch>    (e.g. master, develop)
      #   master/main → latest      (the "production" tag)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          # Push on merge to branch; validate-only on PRs (no storage cost)
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Free layer cache — unchanged ML model layers skip rebuild
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Summary job for branch protection ───────────────────────────────────────
  ci-success:
    name: CI Success
    if: always()
    runs-on: ubuntu-latest
    needs: [test, build]
    steps:
      - name: Check all jobs passed
        run: |
          echo "test:  ${{ needs.test.result }}"
          echo "build: ${{ needs.build.result }}"
          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.build.result }}" == "failure" ]]; then
            echo "::error::CI failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" == "cancelled" || "${{ needs.build.result }}" == "cancelled" ]]; then
            echo "::warning::CI was cancelled"
            exit 1
          fi
          echo "CI passed"