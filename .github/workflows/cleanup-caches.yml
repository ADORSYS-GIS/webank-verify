name: Cleanup Caches

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    name: Delete Stale Caches
    runs-on: ubuntu-latest

    steps:
      - name: Delete all caches
        run: gh cache delete --all -R ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}